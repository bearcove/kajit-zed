name = "Kajit IR"
language_servers = ["kajit-lsp"]
# The Tree-sitter grammar is intentionally empty. Keep coloring in the LSP
# semantic-token path, not in Tree-sitter.
grammar = "kajit_hir"
path_suffixes = ["k-ir"]
line_comments = ["//"]
block_comments = [["/*", "*/"]]
tab_size = 2
autoclose_before = "]})"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = false },
    { start = "[", end = "]", close = true, newline = false },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
]
word_characters = ["_", "-"]
