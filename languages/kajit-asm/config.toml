name = "Kajit ASM"
language_servers = ["kajit-lsp"]
grammar = "kajit_hir"
path_suffixes = ["k-asm"]
line_comments = ["//"]
block_comments = [["/*", "*/"]]
tab_size = 2
autoclose_before = "]})"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = false },
    { start = "[", end = "]", close = true, newline = false },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
]
word_characters = ["_", "-"]
