id = "kajit"
name = "Kajit"
version = "0.1.0"
schema_version = 1
description = "Kajit language support."
repository = "https://github.com/bearcove/kajit-zed"
authors = ["Amos Wenger <amos@bearcove.eu>"]
themes = []
icon_themes = []
languages = [
    "languages/kajit-hir",
    "languages/kajit-asm",
    "languages/kajit-ir",
    "languages/kajit-mir",
]
capabilities = []

[lib]

# Tree-sitter is present only to satisfy Zed's language-package requirement.
# This grammar is intentionally empty. Kajit highlighting must come exclusively
# from LSP semantic tokens, not Tree-sitter queries.
[grammars.empty_on_purpose]
repository = "https://github.com/bearcove/kajit-zed"
rev = "main"
path = "grammars/empty-on-purpose"

[language_servers.kajit-lsp]
name = "Kajit LSP"
languages = ["Kajit HIR", "Kajit ASM", "Kajit IR", "Kajit MIR"]

[context_servers]

[agent_servers]

[slash_commands]
